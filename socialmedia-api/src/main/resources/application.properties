spring.application.name=socialmedia-api

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/socialmedia_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:3d7f8a2b9c1e4f6a0b5d8e2f7a3c6b9d1e4f7a0c3b6d9e2f5a8c1b4d7e0f3a6}
jwt.expiration=86400000

# Logging
logging.level.com.manoj=INFO
logging.level.org.springframework.security=WARN
