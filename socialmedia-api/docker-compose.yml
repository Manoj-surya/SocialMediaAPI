version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: socialmedia-db
    environment:
      POSTGRES_DB: socialmedia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: socialmedia-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/socialmedia_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-in-production-use-a-long-random-string
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
